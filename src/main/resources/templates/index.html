<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ScanBridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell">
    <section class="toolbar">
        <div>
            <h1>ScanBridge</h1>
            <p>
                <span>Digitalizacao compartilhada para usuarios da rede</span>
                <span class="user-line" th:text="${currentUser}"></span>
            </p>
        </div>
        <form class="logout-form" th:action="@{/logout}" method="post">
            <button type="submit" class="secondary-button">Sair</button>
        </form>
        <form class="scan-form" th:action="@{/scan}" th:object="${scanRequest}" method="post">
            <label>
                DPI
                <input type="number" th:field="*{dpi}" min="75" max="600" step="25">
            </label>
            <label>
                Cor
                <select th:field="*{colorMode}">
                    <option value="color">Colorido</option>
                    <option value="grayscale">Cinza</option>
                    <option value="blackwhite">Preto e branco</option>
                </select>
            </label>
            <button type="submit">Digitalizar</button>
        </form>
    </section>

    <p class="alert success" th:if="${success}" th:text="${success}"></p>
    <p class="alert error" th:if="${error}" th:text="${error}"></p>

    <section class="documents">
        <div class="section-title">
            <h2>Documentos</h2>
            <span th:text="${#lists.size(documents)} + ' arquivo(s)'"></span>
        </div>

        <div class="empty" th:if="${#lists.isEmpty(documents)}">
            Nenhum documento digitalizado ainda.
        </div>

        <div class="document-grid" th:if="${!#lists.isEmpty(documents)}">
            <article class="document-card" th:each="document : ${documents}">
                <a class="thumbnail-link" th:href="@{/documents/{fileName}/view(fileName=${document.fileName()})}">
                    <img
                            loading="lazy"
                            th:src="@{/documents/{fileName}/content(fileName=${document.fileName()})}"
                            th:alt="${document.fileName()}">
                </a>
                <div class="document-card-body">
                    <h3 th:text="${document.fileName()}">Documento</h3>
                    <p th:text="${#temporals.format(document.createdAt(), 'dd/MM/yyyy HH:mm')}">Data</p>
                    <div class="document-card-footer">
                        <span th:text="${#numbers.formatDecimal(document.size() / 1024.0, 1, 1)} + ' KB'"></span>
                        <a th:href="@{/documents/{fileName}/view(fileName=${document.fileName()})}">Visualizar</a>
                    </div>
                </div>
            </article>
        </div>
    </section>
</main>
</body>
</html>
