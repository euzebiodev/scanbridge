<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${document.fileName()} + ' - ScanBridge'">Documento - ScanBridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="shell viewer-shell">
    <section class="viewer-bar">
        <div>
            <a class="back-link" th:href="@{/}">Voltar</a>
            <h1 th:text="${document.fileName()}">Documento</h1>
            <p>
                <span th:text="${#temporals.format(document.createdAt(), 'dd/MM/yyyy HH:mm')}"></span>
                <span th:text="' - ' + ${#numbers.formatDecimal(document.size() / 1024.0, 1, 1)} + ' KB'"></span>
                <span th:text="' - ' + ${currentUser}"></span>
            </p>
        </div>
        <form class="export-form" th:action="@{/documents/{fileName}/export(fileName=${document.fileName()})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="x" id="crop-x">
            <input type="hidden" name="y" id="crop-y">
            <input type="hidden" name="width" id="crop-width">
            <input type="hidden" name="height" id="crop-height">
            <label>
                Nome
                <input
                        name="documentName"
                        type="text"
                        th:value="${#strings.substringBefore(document.fileName(), '.jpg')}"
                        maxlength="90">
            </label>
            <label>
                Formato
                <select name="format">
                    <option value="pdf">PDF</option>
                    <option value="jpg">JPG</option>
                </select>
            </label>
            <button type="button" class="secondary-button" id="clear-selection">Limpar recorte</button>
            <button type="submit">Baixar</button>
        </form>
    </section>

    <section class="viewer-frame">
        <div class="crop-stage" id="crop-stage">
            <img
                    id="document-image"
                    draggable="false"
                    th:src="@{/documents/{fileName}/content(fileName=${document.fileName()})}"
                    th:alt="${document.fileName()}">
            <div class="crop-selection" id="crop-selection"></div>
        </div>
    </section>
</main>
<script th:src="@{/js/viewer.js}"></script>
</body>
</html>
