<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recuperar senha - ScanBridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-panel">
        <h1>Recuperar senha</h1>
        <p>Informe o e-mail cadastrado para receber o link de redefinicao.</p>

        <p class="alert success" th:if="${success}" th:text="${success}"></p>

        <form class="auth-form" th:action="@{/forgot-password}" th:object="${forgotPasswordRequest}" method="post">
            <label>
                E-mail
                <input th:field="*{email}" type="email" autocomplete="email" required autofocus>
            </label>
            <button type="submit">Enviar link</button>
        </form>

        <a class="auth-link" th:href="@{/login}">Voltar para login</a>
    </section>
</main>
</body>
</html>
