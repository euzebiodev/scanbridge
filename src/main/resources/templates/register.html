<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro - ScanBridge</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/img/scanbridge-icon.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-panel">
        <h1>Criar cadastro</h1>
        <p>Use seu e-mail para manter suas digitalizacoes separadas.</p>

        <p class="alert error" th:if="${error}" th:text="${error}"></p>

        <form class="auth-form" th:action="@{/register}" th:object="${registrationRequest}" method="post">
            <label>
                E-mail
                <input th:field="*{email}" type="email" autocomplete="email" required autofocus>
            </label>
            <button type="submit">Cadastrar</button>
        </form>

        <a class="auth-link" th:href="@{/login}">Ja tenho cadastro</a>
    </section>
</main>
</body>
</html>
