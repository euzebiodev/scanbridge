<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nova senha - ScanBridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-panel">
        <h1>Nova senha</h1>
        <p>Defina uma nova senha para sua conta.</p>

        <p class="alert error" th:if="${error}" th:text="${error}"></p>

        <form class="auth-form" th:action="@{/reset-password}" th:object="${resetPasswordRequest}" method="post">
            <input th:field="*{token}" type="hidden">
            <label>
                Nova senha
                <input th:field="*{password}" type="password" autocomplete="new-password" minlength="8" required autofocus>
            </label>
            <button type="submit">Alterar senha</button>
        </form>

        <a class="auth-link" th:href="@{/login}">Voltar para login</a>
    </section>
</main>
</body>
</html>
