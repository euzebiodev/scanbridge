<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Entrar - ScanBridge</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-panel">
        <h1>ScanBridge</h1>
        <p>Entre para acessar suas digitalizacoes.</p>

        <p class="alert success" th:if="${success}" th:text="${success}"></p>
        <p class="alert success" th:if="${param.logout}">Sessao encerrada.</p>
        <p class="alert error" th:if="${param.error}">E-mail ou senha invalidos.</p>

        <form class="auth-form" th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                E-mail
                <input name="email" type="email" autocomplete="email" required autofocus>
            </label>
            <label>
                Senha
                <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button type="submit">Entrar</button>
        </form>

        <a class="auth-link" th:href="@{/register}">Criar cadastro</a>
    </section>
</main>
</body>
</html>
